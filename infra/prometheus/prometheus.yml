global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: graphpulse

scrape_configs:
  - job_name: graphpulse-api
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: redpanda
    static_configs:
      - targets: ["redpanda:9644"]
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
