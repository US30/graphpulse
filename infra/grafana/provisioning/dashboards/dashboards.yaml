apiVersion: 1

providers:
  - name: GraphPulse Dashboards
    orgId: 1
    folder: GraphPulse
    folderUid: graphpulse
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/dashboards
      foldersFromFilesStructure: false
