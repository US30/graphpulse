version: "3.9"

# ══════════════════════════════════════════════════════════════════════════════
#  GraphPulse — Docker Compose
#  Real-time graph-based fraud detection platform
# ══════════════════════════════════════════════════════════════════════════════

# ── Shared environment anchor ─────────────────────────────────────────────────
x-common-env: &common-env
  # Postgres
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: graphpulse
  POSTGRES_USER: graphpulse
  POSTGRES_PASSWORD: changeme
  DATABASE_URL: postgresql://graphpulse:changeme@postgres:5432/graphpulse
  # Redis / Celery
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  # MinIO (S3-compatible object store)
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: minioadmin
  MINIO_BUCKET: graphpulse-data
  # MLflow
  MLFLOW_TRACKING_URI: http://mlflow:5001
  # Kafka / Redpanda
  KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
  KAFKA_TOPIC_TRANSACTIONS: graphpulse.transactions
  KAFKA_TOPIC_SCORES: graphpulse.scores
  # Feast online store (Redis)
  FEAST_ONLINE_STORE_HOST: redis
  FEAST_ONLINE_STORE_PORT: "6379"

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: graphpulse
      POSTGRES_USER: graphpulse
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U graphpulse -d graphpulse"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redpanda (Kafka-compatible streaming) ─────────────────────────────────────
  redpanda:
    image: redpandadata/redpanda:v24.1.7
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr 0.0.0.0:9092
      - --advertise-kafka-addr localhost:9092
      - --pandaproxy-addr 0.0.0.0:8082
      - --advertise-pandaproxy-addr localhost:8082
      - --schema-registry-addr 0.0.0.0:8081
      - --rpc-addr 0.0.0.0:33145
      - --advertise-rpc-addr redpanda:33145
    ports:
      - "9092:9092"    # Kafka API
      - "8081:8081"    # Schema Registry
      - "8082:8082"    # Pandaproxy (REST)
      - "9644:9644"    # Admin API
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # ── Redpanda Console (Kafka UI) ────────────────────────────────────────────────
  redpanda-console:
    image: redpandadata/console:v2.6.0
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8080:8080"
    depends_on:
      redpanda:
        condition: service_healthy
    restart: unless-stopped

  # ── MinIO (S3-compatible object store) ────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MLflow tracking server ─────────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.15.0
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root s3://graphpulse-mlflow/
      --host 0.0.0.0
      --port 5001
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "5001:5001"
    volumes:
      - mlflow_data:/mlflow
    depends_on:
      minio:
        condition: service_healthy
    restart: unless-stopped

  # ── Feast feature server ───────────────────────────────────────────────────────
  feast:
    image: feastdev/feature-server:0.40.0
    ports:
      - "6566:6566"
    volumes:
      - ./infra/feast/feature_store.yaml:/feature_store.yaml:ro
    environment:
      <<: *common-env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── FastAPI inference / REST API ───────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      <<: *common-env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    restart: unless-stopped

  # ── Kafka producer (transaction ingestion) ────────────────────────────────────
  producer:
    build:
      context: .
      dockerfile: apps/producer/Dockerfile
    environment:
      <<: *common-env
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    depends_on:
      redpanda:
        condition: service_healthy
    restart: unless-stopped

  # ── Kafka consumer (scoring pipeline) ────────────────────────────────────────
  consumer:
    build:
      context: .
      dockerfile: apps/consumer/Dockerfile
    environment:
      <<: *common-env
    depends_on:
      redpanda:
        condition: service_healthy
      api:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Prometheus ────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

  # ── Grafana ───────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redpanda_data:
  minio_data:
  mlflow_data:
  grafana_data:
